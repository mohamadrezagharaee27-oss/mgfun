services:
  - type: web
    name: mgfun
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mgfun-db
          property: connectionString

databases:
  - name: mgfun-db
    databaseName: mgfun
    user: mgfun_user
    plan: free
