{% extends "base.html" %}
{% block title %}Login – MgFun{% endblock %}
{% block content %}
<div class="form-page form-page--narrow">
  <h1>Login</h1>
  <form method="POST" class="post-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required class="form-control" autofocus />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required class="form-control" />
    </div>
    <button type="submit" class="btn btn-primary">Log In</button>
    <p class="form-hint">No account? <a href="{{ url_for('register') }}">Register</a></p>
  </form>
</div>
{% endblock %}
