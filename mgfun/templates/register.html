{% extends "base.html" %}
{% block title %}Register – MgFun{% endblock %}
{% block content %}
<div class="form-page form-page--narrow">
  <h1>Create Account</h1>
  <form method="POST" class="post-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required class="form-control" autofocus />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required class="form-control" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required class="form-control" />
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
    <p class="form-hint">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </form>
</div>
{% endblock %}
